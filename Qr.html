<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qr generator</title>
  <link rel="stylesheet" href="Qr.css">
</head>
<body>
  <div class="container">
    <p>Enter your text or URL</p>
    <input type="text" placeholder=" Student Name" id="qrText">
    <input type="text" placeholder="Branch" id="qrText1">
    <input type="text" placeholder="Father's name" id="qrText2">
    <div id="imgBox">
      <img alt="qrImage" id="qrImage">
    </div>
    <button onclick="generateQR()">Generate QR Code</button>
     <button onclick="downloadQR()">DownLoad QR Code</button>
  </div>

<script src="Qr.js"></script>  
</body>
</html>
